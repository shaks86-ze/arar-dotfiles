	#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = fuzzel


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
 exec-once = waybar 
 exec-once = awww init
 exec-once = mako
 exec-once = awww-daemon
 exec-once =  awww img ~/Descargas/nevata.png




#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#genera
general {
    # Rojo Alerta Signalis (Rojo muy saturado y un tono más oscuro para el degradado)
    col.active_border = rgb(E61919) rgb(800000) 45deg
    col.inactive_border = rgba(00000000) # Completamente transparente cuando no está activa

    gaps_in = 10
    gaps_out = 20
    border_size = 2
 #   rounding = 0 # Mantener industrial, sin curvas
}
master {
    new_status = master
}
decoration {
    # Opacidad más agresiva, estilo visor nocturno
    active_opacity = 0.95
    inactive_opacity = 0.70
    fullscreen_opacity = 1.0

    # Blur sutil pero oscuro
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        brightness = 0.5 # Oscurece el fondo detrás de la ventana
    }

#    drop_shadow = true
#    shadow_range = 15
#    shadow_render_power = 4
#    col.shadow = rgba(E6191933) # Una sombra roja muy tenue (brillo del visor)
}


# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    # Curva de aceleración mecánica (rápida al inicio, frena en seco)
    bezier = ararCurve, 0.05, 0.9, 0.1, 1.05

    # Animaciones: Duración corta para que se sienta reactivo
    animation = windows, 1, 3, ararCurve
    animation = windowsOut, 1, 3, ararCurve, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 4, ararCurve, slide

# Animación de entrada con un ligero rebote técnico
bezier = myBezier, 0.05, 0.9, 0.1, 1.05
animation = windows, 1, 5, myBezier, slide
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
